default:
  image: registry.docker.ofd.nov:5000/analytics/ci-liberica-sbt:jdk_17.0.16_sbt_1.12.9
  tags:
    - analytics
    - build
    - docker

variables:
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - verify
  - build
  - publish

verify formatting:
  stage: verify
  script:
    - sbt scalafmtCheckAll scalafmtSbtCheck headerCheck

compile and test:
  stage: build
  services:
    - docker:dind
  script:
    - sbt compile test
  artifacts:
    when: always
    reports:
      junit:
        - "**/target/test-reports/TEST-*.xml"

publish artifacts:
  stage: publish
  rules:
    - if: ($CI_COMMIT_BRANCH == "develop"
        || $CI_COMMIT_BRANCH =~ /^release/)
  script:
    - sbt publish
